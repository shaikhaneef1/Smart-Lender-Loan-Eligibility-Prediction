<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body">

<h2 class="text-center text-primary mb-2">
🏦 Smart Loan Eligibility Prediction
</h2>

<p class="text-center text-muted mb-4">
Fill all the details below to check your loan eligibility using our AI model.
</p>

<form action="/result" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Gender</label>

<select name="gender" class="form-select" required>

<option value="1">Male</option>

<option value="0">Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Married</label>

<select name="married" class="form-select" required>

<option value="1">Yes</option>

<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Dependents</label>

<select name="dependents" class="form-select">

<option value="0">0</option>

<option value="1">1</option>

<option value="2">2</option>

<option value="3">3+</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Education</label>

<select name="education" class="form-select">

<option value="0">Graduate</option>

<option value="1">Not Graduate</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Self Employed</label>

<select name="self_employed" class="form-select">

<option value="0">No</option>

<option value="1">Yes</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Applicant Income</label>

<input
type="number"
name="applicant_income"
class="form-control"
placeholder="Enter Applicant Income"
min="0"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Coapplicant Income</label>

<input
type="number"
name="coapplicant_income"
class="form-control"
placeholder="Enter Co-Applicant Income"
min="0"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Loan Amount</label>

<input
type="number"
name="loan_amount"
class="form-control"
placeholder="Enter Loan Amount"
min="1"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Loan Term (Months)</label>

<input type="number" name="loan_term" class="form-control" value="360">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Credit History</label>

<select name="credit_history" class="form-select">

<option value="1">Good</option>

<option value="0">Bad</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Property Area</label>

<select name="property_area" class="form-select">

<option value="0">Rural</option>

<option value="1">Semiurban</option>

<option value="2">Urban</option>

</select>

</div>

</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-primary btn-lg">

🚀 Predict Loan Eligibility

</button>

<a href="/" class="btn btn-success btn-lg ms-2">

🏠 Home

</a>

</div>

</form>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
